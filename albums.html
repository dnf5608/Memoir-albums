<!DOCTYPE html>
<html>
<head>
  <title>Albums</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }

    h1 {
      text-align: center;
      margin: 50px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px 60px;
    }

    .card {
      background: #f4f4f4;
      height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      background: #eaeaea;
    }

    .back {
      display: block;
      text-align: center;
      margin: 40px;
      text-decoration: none;
      color: black;
    }
  </style>
</head>

<body>

  <h1>Our Albums</h1>

  <div class="grid">
    <div class="card">Wedding</div>
    <div class="card">Family</div>
    <div class="card">Memorial</div>
    <div class="card">Travel</div>
  </div>

  <a class="back" href="index.html">← Back Home</a>

</body>
</html>
